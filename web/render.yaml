# Blueprint do Render (https://render.com). Faz deploy via Docker.
# Como usar: copie este arquivo para a RAIZ do repositório (ou aponte o
# "Root Directory" do serviço para `web/`), conecte o repo no Render e
# clique em "New > Blueprint".
services:
  - type: web
    name: iptv-web
    runtime: docker
    rootDir: web
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: REFRESH_INTERVAL_MIN
        value: "360"
      # Defina um valor secreto no painel para habilitar o /api/reload.
      - key: RELOAD_TOKEN
        sync: false
