<!doctype html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IPTV Web — iptv-org</title>
    <meta
      name="description"
      content="Catálogo de canais IPTV públicos (iptv-org) com player HLS."
    />
    <meta name="theme-color" content="#0f1115" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="icon" href="./icon.png" sizes="512x512" type="image/png" />
    <link rel="apple-touch-icon" href="./icon.png" />
    <!-- Preview social (Open Graph / Twitter). -->
    <meta property="og:title" content="IPTV Web" />
    <meta
      property="og:description"
      content="Catálogo de canais IPTV públicos (iptv-org) com player HLS no navegador."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="./og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="./og.png" />
    <link rel="stylesheet" href="./css/styles.css" />
    <!-- hls.js para reprodução de HLS em navegadores sem suporte nativo.
         integrity (SRI) garante que o CDN não sirva um script adulterado. -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"
      integrity="sha384-w6Gb3fXHb5e1LUYa/hYA5Q41bEDglN5ZPCG7Jvnoo8/X90oGnlPqBlBJCe38mEMm"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <img class="brand-logo" src="./logo.png" alt="IPTV Web" width="532" height="208" />
      </div>
      <div class="search">
        <input
          id="search"
          type="search"
          placeholder="Buscar canal…"
          autocomplete="off"
          aria-label="Buscar canal"
        />
      </div>
      <button id="theme-toggle" class="icon-btn" title="Alternar tema" aria-label="Alternar tema">
        🌓
      </button>
    </header>

    <div class="layout">
      <aside class="sidebar" id="sidebar">
        <div class="filter-block">
          <label for="filter-category">Categoria</label>
          <select id="filter-category"><option value="">Todas</option></select>
        </div>
        <div class="filter-block">
          <label for="filter-country">País</label>
          <select id="filter-country"><option value="">Todos</option></select>
        </div>
        <div class="filter-block">
          <label for="filter-language">Idioma</label>
          <select id="filter-language"><option value="">Todos</option></select>
        </div>
        <label class="checkbox">
          <input type="checkbox" id="filter-favorites" />
          <span>⭐ Só favoritos <span id="fav-count" class="count-pill"></span></span>
        </label>
        <label class="checkbox">
          <input type="checkbox" id="filter-nsfw" />
          <span>Mostrar conteúdo adulto</span>
        </label>
        <button id="continue-watching" class="btn btn-ghost" hidden>▶ Continuar assistindo</button>
        <p class="meta" id="meta-info"></p>
      </aside>

      <main class="content">
        <!-- Player (oculto até escolher um canal). -->
        <section id="player-panel" class="player-panel" hidden>
          <div class="player-wrap">
            <video id="video" controls playsinline></video>
            <div id="player-status" class="player-status"></div>
          </div>
          <div class="player-info">
            <h2 id="player-title"></h2>
            <div id="player-badges" class="badges"></div>
            <div id="player-epg" class="epg" hidden></div>
            <div class="player-actions">
              <button id="player-pip" class="btn btn-ghost" title="Picture-in-Picture">
                🖼️ PiP
              </button>
              <button id="player-share" class="btn btn-ghost" title="Copiar link do canal">
                🔗 Compartilhar
              </button>
              <button id="player-close" class="btn">Fechar</button>
            </div>
          </div>
        </section>

        <section class="results">
          <div id="grid" class="grid" aria-live="polite"></div>
          <div id="empty" class="empty" hidden>Nenhum canal encontrado.</div>
          <div class="pager">
            <button id="prev" class="btn" disabled>← Anterior</button>
            <span id="page-info" class="page-info"></span>
            <button id="next" class="btn" disabled>Próximo →</button>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./js/app.js"></script>
    <script>
      // Registra o service worker (PWA / cache do app shell).
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(() => {})
        })
      }
    </script>
  </body>
</html>
